name: Release Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Load config
    runs-on: ubuntu-latest
    outputs:
      cosmwasm: ${{ steps.set.outputs.cosmwasm }}
      standard: ${{ steps.set.outputs.standard }}
    steps:
      - uses: actions/checkout@v6

      - id: set
        run: |
          echo "cosmwasm=$(jq -c '{include: [.binaries[] | select(.buildType == "cosmwasm")]}' config/binaries.json)" >> "$GITHUB_OUTPUT"
          echo "standard=$(jq -c '{include: [.binaries[] | select(.buildType == "standard")]}' config/binaries.json)" >> "$GITHUB_OUTPUT"

  build-cosmwasm:
    name: Build ${{ matrix.name }}
    needs: prepare
    if: fromJson(needs.prepare.outputs.cosmwasm).include[0] != null
    runs-on: ubuntu-latest
    container:
      image: golang:1.25-alpine
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.cosmwasm) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: apk add --no-cache ca-certificates build-base git

      - name: Clone source
        run: git clone --depth 1 --branch ${{ matrix.ref }} https://github.com/${{ matrix.repo }}.git /tmp/src

      - name: Download wasmvm static lib
        working-directory: /tmp/src
        run: |
          WASMVM_VERSION=$(go list -m github.com/CosmWasm/wasmvm/v3 2>/dev/null || go list -m github.com/CosmWasm/wasmvm/v2 2>/dev/null)
          WASMVM_VERSION=${WASMVM_VERSION##* }
          wget -q "https://github.com/CosmWasm/wasmvm/releases/download/${WASMVM_VERSION}/libwasmvm_muslc.x86_64.a" -O /lib/libwasmvm_muslc.x86_64.a

      - name: Build binary
        working-directory: /tmp/src
        run: |
          mkdir -p build
          LEDGER_ENABLED=false BUILD_TAGS=muslc LINK_STATICALLY=true make build

      - name: Package
        env:
          BINARY_NAME: ${{ matrix.name }}
        run: gzip -c "/tmp/src/build/${BINARY_NAME}" > "/tmp/${BINARY_NAME}-linux-amd64.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: /tmp/${{ matrix.name }}-linux-amd64.gz

  build-standard:
    name: Build ${{ matrix.name }}
    needs: prepare
    if: fromJson(needs.prepare.outputs.standard).include[0] != null
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.standard) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Clone source
        run: git clone --depth 1 --branch ${{ matrix.ref }} https://github.com/${{ matrix.repo }}.git /tmp/src

      - name: Build binary
        working-directory: /tmp/src
        env:
          BUILD_CMD: ${{ matrix.buildCmd }}
        run: |
          mkdir -p build
          if [ -n "$BUILD_CMD" ]; then
            sh -c "$BUILD_CMD"
          else
            make build
          fi

      - name: Package
        env:
          BINARY_NAME: ${{ matrix.name }}
        run: gzip -c "/tmp/src/build/${BINARY_NAME}" > "/tmp/${BINARY_NAME}-linux-amd64.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: /tmp/${{ matrix.name }}-linux-amd64.gz

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [prepare, build-cosmwasm, build-standard]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: /tmp/artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="binaries/latest"

          # Only source-built binaries are uploaded here. Prebuilt entries
          # (gaiad/hermes) are downloaded by CI straight from their upstream
          # releases, so list them separately as dependencies, not as assets.
          UPLOADED=$(jq -r '.binaries[] | select(.buildType != "prebuilt") | "- \(.name): \(.repo)@\(.ref)"' config/binaries.json)
          UPSTREAM=$(jq -r '.binaries[] | select(.buildType == "prebuilt") | "- \(.name): \(.repo)@\(.ref)"' config/binaries.json)
          BODY="Uploaded assets (source-built, linux/amd64 static):
          ${UPLOADED}

          Fetched by CI from upstream (not in this release):
          ${UPSTREAM}

          Updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "Prebuilt Binaries (latest)" \
            --notes "$BODY" \
            --prerelease \
            /tmp/artifacts/*-linux-amd64.gz
