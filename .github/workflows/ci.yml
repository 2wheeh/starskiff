name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Published-image allowlist guard (maroo hard rule)
        run: node scripts/check-image-allowlist.mjs

      - name: Build & Type check
        run: pnpm check

      - name: Unit & Smoke tests
        run: pnpm test:unit

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The docs site is a workspace package but root check/build only filter
      # `starskiff`, so a broken vocs page or workspace link would merge unseen.
      - name: Build docs
        run: pnpm docs:build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download source-built binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "binaries/latest" --pattern "*.gz" --dir /tmp

          # read line-by-line: `for x in $(jq ...)` word-splits on spaces, which
          # shreds any JSON field that contains them (e.g. binaries.json `reason`).
          # Use a pipeline (not `< <(...)`): with pipefail a jq failure fails the
          # pipeline and aborts the job; process substitution runs jq async and
          # its exit status would be ignored by set -e.
          jq -r '.binaries[] | select(.buildType != "prebuilt") | .name' config/binaries.json \
          | while IFS= read -r name; do
            gunzip -c "/tmp/${name}-linux-amd64.gz" > "/usr/local/bin/${name}"
            chmod +x "/usr/local/bin/${name}"
          done

      - name: Download prebuilt binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Pipeline (not `< <(...)`) so pipefail propagates a jq failure and
          # aborts the job; process substitution would run jq async with its
          # exit status ignored by set -e.
          jq -c '.binaries[] | select(.buildType == "prebuilt")' config/binaries.json \
          | while IFS= read -r row; do
            name=$(jq -r '.name' <<<"$row")
            repo=$(jq -r '.repo' <<<"$row")
            ref=$(jq -r '.ref' <<<"$row")
            asset=$(jq -r '.asset' <<<"$row")
            extract=$(jq -r '.extract // "none"' <<<"$row")  # null -> "none", not literal "null"

            gh release download "$ref" --repo "$repo" --pattern "$asset" --dir /tmp

            if [ "$extract" = "tar" ]; then
              tar -xzf "/tmp/${asset}" -C /tmp
            else
              mv "/tmp/${asset}" "/tmp/${name}"
            fi

            mv "/tmp/${name}" "/usr/local/bin/${name}"
            chmod +x "/usr/local/bin/${name}"
          done

      - name: Integration tests
        run: pnpm test:integration

      # Feature project tests whose deps exist on CI: xplad-docker (pulls the
      # official image) and extra-validators (uses the simd binary). marood
      # (private binary) and evmd-docker (image not yet published) are excluded
      # until their infra lands.
      - name: Feature tests (container runtime + multi-validator)
        run: pnpm --filter starskiff exec vitest run test/xplad-docker.test.ts test/extra-validators.test.ts
