name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Published-image allowlist guard (maroo hard rule)
        run: node scripts/check-image-allowlist.mjs

      - name: Build & Type check
        run: pnpm check

      - name: Unit & Smoke tests
        run: pnpm test:unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # All source-built lanes are gone (evmd moved to its published image), so
      # only upstream prebuilt assets are provisioned. If a source-built entry
      # returns to config/binaries.json, restore the "Download source-built
      # binaries" step that gunzips them from the binaries/latest release.
      - name: Download prebuilt binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Pipeline (not `< <(...)`) so pipefail propagates a jq failure and
          # aborts the job; process substitution would run jq async with its
          # exit status ignored by set -e.
          jq -c '.binaries[] | select(.buildType == "prebuilt")' config/binaries.json \
          | while IFS= read -r row; do
            name=$(jq -r '.name' <<<"$row")
            repo=$(jq -r '.repo' <<<"$row")
            ref=$(jq -r '.ref' <<<"$row")
            asset=$(jq -r '.asset' <<<"$row")
            extract=$(jq -r '.extract // "none"' <<<"$row")  # null -> "none", not literal "null"

            gh release download "$ref" --repo "$repo" --pattern "$asset" --dir /tmp

            if [ "$extract" = "tar" ]; then
              tar -xzf "/tmp/${asset}" -C /tmp
            else
              mv "/tmp/${asset}" "/tmp/${name}"
            fi

            mv "/tmp/${name}" "/usr/local/bin/${name}"
            chmod +x "/usr/local/bin/${name}"
          done

      - name: Integration tests
        run: pnpm test:integration

      # Feature project tests whose deps exist on CI: the *-docker suites pull
      # public images (xplad/mantra official, xrplevm amd64-only — fine on
      # amd64 runners, evmd the digest-pinned image starskiff publishes), and
      # extra-validators uses the simd image. marood (private binary) stays
      # excluded.
      - name: Feature tests (container runtime + multi-validator)
        run: pnpm --filter starskiff exec vitest run test/xplad-docker.test.ts test/evmd-docker.test.ts test/xrplevm-docker.test.ts test/mantra-docker.test.ts test/extra-validators.test.ts
